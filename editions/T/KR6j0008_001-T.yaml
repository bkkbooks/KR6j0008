body:
  text: 歸命滿分淨法身毘盧遮那遍照智開敷妙覺光明眼修廣猶若青蓮葉我今依經要略說自利利他悉地法真言次第方便行發起信解勝妙門先令自心離塵垢思惟諸佛現於前諦想自身在其所虔誠布散妙香華種種勝妙莊嚴具瞻仰本尊明印法一心恭敬而作禮作禮方便真言曰地持印唵引一曩莫薩嚩怛他蘖多二迦野弭嚩入吃質二合多三嚩日羅二合滿娜南迦魯弭四由此作禮真實言即能遍禮十方佛右膝著地合爪掌思惟說悔先罪業我由無明所積集身口意業造眾罪貪欲恚癡覆心故於佛正法賢聖僧父母二師善知識及以無量眾生所無始生死流轉中具造極重無盡罪親對十方現在佛悉皆懺悔不復作出罪方便真言曰大慧刀印唵引一薩嚩播波薩怖二合吒二娜訶曩嚩日囉二合野三娑嚩二合引賀引南無十方三世佛三種常身正法藏勝願菩提大心眾我今皆悉正歸依歸依方便真言曰普印唵一薩嚩沒馱冒地薩怛鑁三合引二設囉赧蘖車弭三嚩日囉二合達麼四頡唎二合五我淨此身離諸垢及與三世身口意過於大海剎塵數奉獻一切諸如來施身方便真言曰獨股印唵一薩嚩怛他蘖多二合二布惹鉢囉二合嚩無渴反㗚多二合曩夜怛麼二合南三涅哩二合夜引哆夜弭四薩嚩怛他引蘖多室者二合地底瑟姹二合擔五薩嚩去怛他蘖多惹難謎阿味設覩引六淨菩提心勝願寶我今起發濟群生生苦等集所纏身及與無知所害身救攝歸依令解脫常當利益諸含識發菩提心方便真言曰定印唵一冒地唧多二母怛跛娜夜弭三十方無量世界中諸正遍知大海眾種種善巧方便力及諸佛子為群生諸有所修福業等我今一切盡隨喜隨喜方便真言曰歸命合掌唵引一薩嚩怛他蘖多二本若尼也反惹曩三弩暮捺那布闍迷伽三暮捺囉二合四薩叵二合羅儜三摩曳引五吽我今勸請諸如來菩提大心救世者唯願普於十方界常以大雲降法雨勸請方便真言曰金剛合掌唵引一薩嚩怛他蘖多二睇灑儜布惹迷伽三暮捺囉二合三薩叵二合囉儜三摩曳四吽願令凡夫所住處速捨眾苦所集身當得至於無垢處安住清淨法界身奉請法身方便真言曰金剛合掌內縛以慧頭指如鉤招之唵引一薩嚩怛他引蘖多二捺睇灑夜弭三薩嚩薩怛嚩二合係多引㗚他二合去野四達磨馱覩悉體他以反二合底㗚嚩二合靺覩五所修一切眾善業利益一切眾生故我今盡皆正迴向除生死苦至菩提迴向方便真言曰金剛合掌唵引一薩嚩怛他引蘖多二合二涅哩二合野曩囉二合布惹迷伽三暮捺囉二合三薩叵二合囉儜三摩曳四吽身隨所應以安坐分明諦觀初字門次當結三昧耶印所謂淨除三業道真言曰曩莫三漫多沒馱引南一阿三迷二怛哩二合三迷三三麼曳四娑嚩二合賀纔結此密印能淨如來地地波羅蜜滿成三法界道次結法界生密慧之幖幟淨身口意故遍轉於身分彼真言曰曩莫三滿多沒馱南一達磨馱睹二薩嚩二合婆嚩句唅三如法界自性而觀於自身為令彼堅固觀自執金剛結金剛輪印亦名轉法輪印金剛薩埵真言曰曩莫三滿多上嚩日囉二合𧹞一嚩日羅二合怛摩二合句唅三諦觀我此身即是執金剛次擐金剛甲當觀所被服遍體生焰光彼真言曰曩莫三滿多嚩日羅二合𧹞唵嚩日羅二合迦嚩遮二吽囉字色鮮白空點以嚴之如彼髻明珠置之於頂上所積眾罪垢由是悉除滅福慧皆圓滿一切觸穢處當加此字門赤色具威光焰鬘遍圍繞次為降伏魔制諸大障者當念大護者無能堪忍明真言曰曩莫薩嚩怛他引蘖帝毘藥二合一薩嚩佩也尾蘖帝弊二尾濕嚩二合目契弊三薩嚩他四唅欠五囉吃灑二合摩訶沫麗六薩嚩怛他蘖多奔尼也二合涅左帝七吽吽八怛羅二合吒怛囉二合吒九阿鉢囉二合底訶諦十娑嚩二合賀由纔憶念故諸毘那夜迦惡形羅剎等彼一切馳散警發於地神應說如是偈雙膝長跪定手持杵當心慧手舒五指平掌按地怛鑁二合汝也泥引尾引天也有女聲娑引乞叉引二合護也部引跢引悉親也於也一薩嚩一切沒馱引曩佛有多聲跢引易南引二左里也二合引曩也修行尾勢引曬引數入殊勝三部引密淨地播囉密哆引速者等四摩囉天魔細引便演二合怛他引如婆蘖喃二合破五舍引吉也二合釋迦也僧呬引曩師子跢引易弩引救世六怛他引賀如我魔囉魔惹演乞㗚二合怛嚩二合引伏七滿拏攬歷曼荼羅洛佉夜引畫沒藥二合唅我八地神持次第真言曰唵部引入欠灑淨真言曰三股杵印曩莫三去滿多沒馱引喃引一阿鉢羅二合底娑上謎二誐誐曩娑上謎三三滿多引弩鼻音蘖帝引四鉢羅二合訖哩二合底尾秫弟引五達摩馱引覩尾戍馱𩕳六娑嚩二合賀地神勸請偈曰諸佛慈愍有情者唯願存念於我等我今請白諸賢聖堅牢地天并眷屬一切如來及佛子不捨悲願悉降臨我受此地求成就為作證明加護我持地真言曰持地印曩莫三去滿多沒馱引南引一薩嚩怛他蘖多引二地瑟吒二合曩引地瑟恥二合帝三阿佐麗四尾麼麗五娑麼二合囉禰平六鉢囉訖哩二合底鉢哩輸睇七娑嚩二合賀大毘盧遮那成佛神變加持經菩提幢密印幖幟祕密漫荼羅法品之一爾時世尊又復宣說入祕密漫荼羅法優陀那曰真言遍學者通達祕密壇如法為弟子燒盡一切罪壽命悉焚滅令彼不復生同於灰燼已彼壽命還復謂以字燒字因字而更生一切壽乃至清淨遍無垢以十二支句而作於彼器如是三昧耶一切諸如來菩薩救世者及佛聲聞眾乃至諸世間平等不違逆解此平等誓祕密漫荼羅入一切法教諸壇得自在我身等同彼真言者亦然以不相異故說名三昧耶現前觀羅字謂淨光焰鬘赫如朝日暉念聲真實義能除一切障解脫三毒垢諸法亦復然先自淨心地復淨道場地悉除眾過患其相如虛空如金剛所持此地亦如是住本尊瑜伽加以五支字等引而運想即同牟尼尊阿字遍金色用作金剛輪加持於下體說名瑜伽座鑁字素月光在於霧聚中加持自臍上是名大悲水囕字初日暉彤赤在三角加持本心位是名智火光唅字劫災焰黑色在風輪加持白毫際說名自在力佉字及空點想成一切色加持在頂上故名為大空五字以嚴身威德矩熾然滅除眾罪業天魔為障者見赫奕金剛首中百光王安立無垢眼觀身同如來復念滿足句曩莫三滿多沒馱喃阿鑁囕唅欠安立器世間空風最居下次觀火水地是輪同金剛名大因陀羅光焰淨金色普皆遍流出爾時薄伽梵觀察大眾會告祕密主言有法界幖幟由是嚴身故生死中巡歷於如來大會菩提幢幖幟諸天龍夜叉恭敬而受教初印佛三昧法界及法輪憩伽歸命合屈風空輪加法螺虛心合風絞空輪上吉祥願蓮華金剛大慧印摩訶如來頂慧拳毫相藏瑜伽持鉢相智慧手上舒名無畏施者下垂號滿願慧拳舒火水智者成佛眼內縛風輪索心印舒火輪舒水如來臍內縛舒慧水是名如來腰如次習真言大慧刀真言曰曩莫三曼多沒馱引喃一摩賀引朅伽尾囉惹二達摩珊捺囉二合奢迦娑訶惹三薩得迦二合野捺㗚二合瑟恥砌諾迦四怛他引蘖多尾目吃底二合儞入佐多五尾囉誐達磨儞入惹多吽六大法螺真言曰曩莫三滿多沒馱引喃一暗去蓮華座真言曰曩莫三滿多沒馱引喃一阿去金剛大慧真言曰曩莫三滿多縛日羅二合𧹞一吽如來頂真言曰曩莫三滿多沒馱引喃一吽吽如來頂相真言曰曩莫三滿多沒馱引喃一誐誐曩引難多娑叵二合囉儜二尾秫馱達磨儞入丁逸反惹帝三娑嚩二合賀引毫相藏真言曰曩莫三滿多沒馱引喃一阿急呼唅惹入大鉢真言曰曩莫三曼多沒馱引喃婆上急呼施無畏真言曰曩莫三曼多沒馱引南一薩囉他二合爾那爾那三佩野曩奢那四娑嚩二合賀與願滿真言曰曩莫三滿多沒馱引喃一嚩囉娜嚩日羅二合怛麼二合迦二娑嚩二合賀悲生眼真言曰曩莫三曼多沒馱引喃一誐誐曩嚩羅落吃叉二合儜二迦嚕拏摩野三怛他引蘖多作吃芻二合四娑嚩二合賀引如來索真言曰曩莫三曼多沒馱引喃一係係摩賀播奢二鉢囉二合娑嘮那哩也二合三薩埵馱睹四微謨訶迦五怛他蘖多地目吃底二合儞入佐多娑嚩二合賀如來心真言曰曩莫三滿多沒馱引喃一枳攘二合怒二嗢婆二合嚩三娑嚩二合賀如來臍真言曰曩莫三滿多沒馱引喃一阿沒㗚二合都嗢婆二合嚩二娑嚩二合賀如來腰真言曰曩莫三曼多沒馱引喃一怛他引蘖多引三婆嚩二娑嚩二合賀藏印虛心合風水屈入內火合空亦然地合令少屈普光準大界二空屈入內風舒如放光火屈如鉤形如來甲如前舌相二空入語門虛中合水風移入內牙印風入掌三補多辯說二風輪置火第三節頭勿相著十力蓮華合地空屈入內掌內節相合念處風捻空開悟空持水普賢如意珠蓮合風加火慈氏印準前屈風火輪下如來藏真言曰曩莫薩嚩怛他引蘖底弊㘕㘕𡀩𡀩二娑嚩二合賀普光真言曰曩莫三滿多沒馱引喃一入嚩二合攞摩𭌆儞平二怛他引蘖多㗚旨二合三娑嚩二合賀如來甲真言曰曩莫三曼多沒馱引喃一鉢囉二合戰拏二縛日羅二合入縛二合攞三尾娑普二合囉吽四如來舌相真言曰曩莫三曼多沒馱引喃一怛他蘖多爾訶嚩二合二薩底也二合達麼鉢囉二合底瑟恥二合多三娑嚩二合賀引如來語真言曰曩莫三漫多沒馱引喃一怛他引蘖多摩訶嚩吃怛囉二合二尾濕嚩二合枳孃二合曩摩護娜也三娑嚩二合賀如來牙真言曰曩莫三滿多沒馱引喃一怛他引蘖多能瑟吒囉三合二囉娑囉娑引釳囉二合三參鉢囉二合引博迦四薩嚩怛他引蘖多五尾灑也參婆上嚩六娑嚩二合賀如來辯說真言曰曩莫三曼多沒馱引喃一阿振底也二合娜部二合多二路波嚩引僧三麼哆上鉢囉二合鉢多二合三尾輸馱娑嚩二合囉引四娑嚩二合賀如來持十力真言曰曩莫三曼多沒馱引喃一捺奢沫浪誐達囉二吽三髯三娑嚩二合賀如來念處真言曰曩莫三曼多沒馱引喃一怛他引蘖多娑麼㗚二合底二薩怛嚩二合係怛嚩二合毘庾二合嗢蘖二合多三誐誐曩三忙三去麼四娑嚩二合賀一切法平等開悟真言曰曩莫三曼多沒馱引喃一薩嚩達麼三麼多鉢囉二合鉢多二合二怛他引蘖多弩蘖多三娑嚩二合賀普賢菩薩如意珠真言曰曩莫三曼多沒馱引喃一參麼多弩蘖多尾囉惹達麼二儞入社多三摩賀摩賀四娑嚩二合賀慈氏菩薩住發生普遍大慈三昧說自心真言曰曩莫三曼多沒馱引喃一阿爾單惹野二薩嚩薩怛嚩二合奢野弩蘖多三娑嚩二合賀時佛住甘露生三昧說一切三世無閡力明妃真言曰頂印怛儞也二合他一誐誐曩三謎二阿鉢囉二合底丁以反三謎三薩嚩怛他引蘖多三麼跢弩蘖帝四誐誐曩三摩五嚩羅落乞叉二合嬭平六娑嚩二合賀無能害力明妃真言曰以梵夾印八遍曩莫薩嚩怛他引蘖帝毘藥二合一薩嚩目契毘藥二合阿三迷三鉢羅謎四阿者隷五誐誐泥娑麼二合羅嬭六薩嚩怛囉二合弩蘖帝七娑嚩二合賀嚴淨佛國土奉仕諸如來諦觀香水海大海真言曰唵尾摩嚕娜地吽金剛手持華內智嚩入莖嚩日羅二合播抳此大真言王印以妙蓮華王持於華藏界最初正覺等敷置曼荼羅密中之祕密大悲胎藏生及無量世間出世漫荼羅彼所有圖像次第說當聽四方普周匝一門及通道金剛印遍嚴中羯麼金剛其上大蓮華妙色金剛莖八葉具鬚蘂眾寶自莊嚴開敷含果實於彼大蓮印大空點莊嚴十二支生句普遍華臺中常出無量光百千眾蓮繞其上復觀想大覺師子座寶王以校飾在大宮殿中寶柱皆行列遍有諸幢蓋