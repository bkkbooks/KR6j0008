body:
  text: 北方地藏尊其座極巧嚴身處於焰胎雜寶莊嚴地綺錯互相間四寶為蓮華聖者所安住金剛不可壞行境界三昧及與大名稱無量諸眷屬日光明菩薩堅固心菩薩并持地菩薩寶手菩薩等寶光明菩薩寶印手菩薩不空見菩薩除一切憂冥祕密內為縛舒散於火輪右觀寶處尊慧拳舒三輪寶上三股印寶掌於寶上一股金剛印慧拳舒水輪持地右寶上二手金剛印寶印手寶上五股金剛印堅固意右寶羯麼金剛印前印諸輪合地藏菩薩真言曰尾薩嚩引捨鉢里布囉迦曩莫三滿多沒馱喃一訶訶訶尾娑麼二合曳二娑嚩二合賀引寶處菩薩真言曰囉怛曩二合迦囉曩莫三滿多沒馱喃一難髯係摩賀摩賀引二娑嚩二合賀引寶手菩薩真言曰囉怛曩二合播抳曩莫三滿多沒馱喃一衫囉怛怒二合嗢婆二合嚩二娑嚩二合賀引持地菩薩真言曰馱囉抳馱囉髯曩莫三滿多沒馱喃一噞達羅尼尼仁反達囉二娑嚩二合賀引寶印手菩薩真言曰囉怛曩二合謨捺囉二合賀薩多曩莫三滿多沒馱喃一唅囉怛曩二合儞入𠼝爾多二娑嚩二合賀引堅固意菩薩真言曰涅哩二合荼地也捨也曩莫三滿多沒馱喃一𧹞嚩日羅二合三婆去嚩一娑嚩二合賀引西方虛空藏勤勇被白衣圓白悅意壇大白蓮華座持大慧刀印如是堅利刃鋒鋭猶氷霜住清淨境界自種子為種智者尊北布檀波羅蜜菩薩戒波羅蜜菩薩忍波羅蜜菩薩精進波羅蜜禪波羅蜜菩薩般若波羅蜜方便波羅蜜願波羅蜜菩薩力波羅蜜菩薩智波羅蜜菩薩金剛藏王菩薩蘇悉地羯羅金剛針菩薩蘇婆呼菩薩無垢逝菩薩發意轉法輪生念處菩薩忿怒鉤菩薩不空鉤自在千眼觀自在曼荼羅菩薩金剛明王菩薩金剛將菩薩軍荼利菩薩不空金剛菩薩供養寶菩薩孔雀明菩薩一介羅剎王十一面自在印形如法教次虛空無垢二手作刀印三補吒空捻風虛空慧法輪清淨慧商佉行慧敷蓮華安住慧菩薩多羅印稍開虛空藏菩薩真言曰能知自心本性清淨空含衆色形利群生曩莫三曼多沒馱喃一伊阿迦奢三曼多弩蘖多二尾質怛㘕二合嚩囉達羅三娑嚩二合賀引虛空無垢菩薩真言曰誐誐曩引麼攞曩莫三滿多沒馱喃一憾誐誐曩引阿難多愚者囉二娑嚩二合賀引虛空慧菩薩真言曰誐誐曩引麼帝曩莫三滿多沒馱喃一陵斫吃囉二合嚩唎底二合二娑嚩二合賀引蓮華印菩薩真言曰普印曩莫三滿多沒馱喃一俱嚩𭋺野二娑嚩二合賀引清淨慧菩薩真言曰尾戌馱麼帝曩莫三滿多沒馱喃一蘖丹達麼三婆嚩二娑嚩二合賀引行慧菩薩真言曰惹𭋺怛縛囉麼帝曩莫三滿多沒馱喃一地㘕鉢納麼二合阿攞上野二娑嚩二合賀引安住慧菩薩真言曰惹悉枇二合羅沒弟曩莫三滿多沒馱喃一吽壤弩納婆嚩二娑嚩二合賀引出現智菩薩真言曰普印又名蘇悉地菩薩可身印又用通印曩莫三滿多沒馱喃一爾嚩日羅二合悉體二合囉沒弟二布囉嚩二合嚩怛麼二合滿怛囉二合娑囉三娑嚩二合賀引執蓮華杵菩薩真言曰普印曩莫三滿多沒馱喃一嚩日囉二合迦囉二娑嚩二合賀引檀波羅蜜菩薩真言曰右仰忍禪相捻唵婆誐嚩底娜引曩地跛帝一尾娑㗚二合惹布羅野娜引難二娑嚩二合賀引戒波羅蜜菩薩真言曰內縛豎禪智唵試引攞馱引哩抳一婆誐嚩底吽引二郝三忍波羅蜜菩薩真言曰內縛進力禪智豎唵婆誐嚩底一乞鏟二合引底馱引哩抳一吽發吒三精進波羅蜜菩薩真言曰準前忍進力析開唵尾引哩野二合迦哩吽一尾引哩裔二合尾哩裔二合二娑嚩二合賀引禪波羅蜜菩薩真言曰仰右於左禪智相拄唵婆誐嚩底一薩嚩播引婆賀引哩抳二摩賀引奈引底曳二合引吽吽吽引發吒三般若波羅蜜菩薩真言曰左平舒右覆左上當心唵地引一室哩二合引二輸嚕二合多三尾惹曳四娑嚩二合賀引方便波羅蜜菩薩真言曰左慧方握智度右亦準忍願相背進力平舒側相拄唵摩賀引每引怛囉二合唧帝一娑嚩二合賀引願波羅蜜菩薩真言曰右手直豎施無畏唵迦嚕抳尼貞反迦嚕抳一賀賀賀糝引二力波羅蜜菩薩真言曰準戒印禪智進力忍願豎頭相合唵娜麼𩕳母儞帝吽引一賀賀賀引吽弱入二智波羅蜜菩薩真言曰外叉作拳檀慧直竪交少分屈進力頭屈圓忍願竪相合唵麼麼枳娘曩迦哩吽引一娑嚩二合賀引復次祕密主今說第二壇正等四方相金剛印圍繞一切妙金色內心蓮華敷臺現迦羅奢光色如淨月亦以大空點周匝自莊嚴上表大風印靉靆猶玄雲鼓動幢幡相空點為幖幟其上生猛焰同於劫災火而作三角形三角以圍之光鬘相周普晨朝日暉色是中鉢頭摩朱黰猶劫火彼上金剛印流散發焰暉持以吽字聲勝妙種子字先佛說是汝勤勇漫荼羅忿怒金剛衆次東第一布發生金剛部金剛鉤菩薩手持金剛菩薩金剛薩埵菩薩持金剛鋒菩薩金剛拳菩薩忿怒月黶菩薩無垢持金剛金剛牢持菩薩忿怒持金剛無邊超越菩薩金剛鎖菩薩持金剛菩薩住無戲論菩薩金剛持輪菩薩金剛鋭菩薩適悅持金剛金剛牙菩薩離戲論菩薩持妙金剛菩薩持金剛利菩薩部母忙莽雞亦持堅慧杵三股嚴身以瓔珞彼右金剛針使者衆圍繞微笑同瞻仰獨股堅利慧內拳申風輪空入左置商佉羅執持金剛鎖自部諸使俱其身淺黃色智杵為幖幟四輪背相叉旋轉慧加定於執金剛下忿怒降三世摧伏大障者號名月黶尊三目四牙現夏時雨雲色阿吒吒笑聲金剛寶瓔珞攝護衆生故無量衆圍繞乃至百千手操持衆器械如是忿怒等皆住蓮華中二空開持風準五古印少不相到諸金剛持地金剛拳內縛二空並竪二肘相近稍高竪以像槌形忿怒軍荼利瑩如碧頗梨威光如劫火赫奕背日輪顰眉笑怒容虎牙上下現千目視不瞬威曜盛如日千手各操持金剛諸器