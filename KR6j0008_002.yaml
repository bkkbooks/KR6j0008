荼羅如本尊相應若依法教於真言門修菩薩行諸菩薩應如是知自身住本尊形堅固不動知本尊已如本尊住而得悉地云何八印寶幢日暉色三角而具光蓮合散地風開敷淨金色嚩字金剛光風輪屈在空彌陀真金色月輪波頭繞開敷妙蓮華鼓音曼荼羅半月空點圍雙地入滿月普賢曼荼羅滿月金剛繞蓮華豎二空觀音頗梨色彩虹金剛幡準前屈火輪如鉤相背文殊鬱金色虛空雜色圍青蓮開火輪慈氏黃金色虛空用青點金剛掌旋轉掌心相著大威德生真言曰曩莫三滿多沒馱喃引一㘕𡀩二娑嚩二合賀引金剛不壞真言曰曩莫三滿多沒馱喃引一鑁嚩二娑嚩二合賀引蓮華藏真言曰曩莫三滿多沒馱喃引一糝索二娑嚩二合賀引萬德莊嚴真言曰曩莫三滿多沒馱喃引一唅鶴二娑嚩二合賀引一切支分生真言曰曩莫三滿多沒馱喃引一暗惡二娑嚩二合賀引世尊陀羅尼曰曩莫三滿多沒馱喃引一沒馱達囉尼二娑沒㗚二合底沫羅馱曩迦𭌆三馱囉馱囉馱囉野馱囉野薩鑁四婆誐嚩底五阿迦引囉嚩底六三麼曳七娑嚩二合賀引文殊師利菩薩法住真言曰曩莫三滿多沒馱喃引一阿去吠娜尾泥二娑嚩二合賀引迅疾彌勒菩薩真言曰曩莫三滿多沒馱喃引一摩訶引瑜引誐瑜引擬宜以反寧二瑜詣濕嚩二合𭌆三缺惹唎計四娑嚩二合賀引無所不至真言曰曩莫薩嚩怛他引蘖帝引毗庾二合引一尾濕嚩二合目契毗藥二合二薩㗚嚩二合他上引三阿上阿引暗惡四即時住於智生三昧而說出生種種巧智百光遍照真言曰金剛掌舒臂頂上時時搖動曩莫三滿多沒馱喃引一暗欲布百光王暗字在其中次輪布十二伊等至塢奧第二迦等二十五字第三輪迦引等二十五第四劍等二十五第五却等二十五右旋轉布相接三七遍加持頂戴盤珠掌內進力屈上節金剛手請問真言行菩薩修行幾時月禁戒得終竟薄伽梵告言善哉勤勇士汝問殊勝戒故佛所開演緣明所起戒住戒如正覺令得成悉地為利世間故等起自真實常住於等引修行戒當竟菩提心業果和合為一相遠離諸造作具戒如佛智異此非具戒得諸法自在通達利衆生常修無著行等礫石衆寶乃至滿落叉所說真言教畢於時月等禁戒量終竟最初於金輪住大因陀羅而觀於阿字當結金剛印飲乳以資身行者一月滿能調出入息次於第二月嚴整水輪中輪圍成九重秋夕月光色應以蓮華印而服醇淨水次於第三月勝妙火輪觀三角威焰鬘結大慧刀印噉不求之食燒滅一切罪而生身語意第四月風輪行者常服風結轉法輪印攝心以持誦金剛水輪觀依住於瑜伽是為第五月遠離得非得行者無所得等同三菩提和合風火輪出過衆過患復一月持誦此名第六月亦捨利非利釋梵等天衆遠住而禮敬一切為守護人天藥草神持明諸靈仙翼侍隨教命羅剎七母神一切為障者見是處光明馳散如猛火恭敬而遠之等正覺真子一切得自在調伏難降者如大執金剛饒益諸群生同於觀世音經逾六月已隨所願成果常當於自他悲愍而救護持珠當心上餘如蘇悉地一一諸真言作心意念誦出入息為二第一常相應阿字布支分持滿三洛叉普賢及文殊執金剛聖天現前而摩頂行者稽首禮速奉閼伽水意生香華鬘便得身清淨念誦分限畢持珠安本處方入三摩地食頃從定出復結根本印真言七遍已次陳虛空眼奉獻香華等悅意妙伽陀閼伽及發願說救世加持令法眼道遍一切處久住當合金剛掌隨明遍觸身加持句真言曰曩莫三滿多沒馱喃引一薩嚩他二勝勝三怛陵二合怛陵二合四顒顒五達鄰達鄰六娑他二合婆野娑他二合婆野七沒馱薩底也二合嚩八達麼薩底也二合嚩九僧伽薩底也二合嚩十娑嚩佉嚩十一吽吽十二吠娜尾泥十三娑嚩二合賀引難堪忍大護左旋解大界還主三昧耶頂上散開之心送於聖天五輪投地禮當啓白衆聖現在諸如來救世諸菩薩不斷大乘教到殊勝位者唯願聖天衆決定證知我各當隨所安後復垂哀赴真言曰唵一訖哩妬嚩二合二薩嚩薩怛嚩二合囉他二合三悉地捺哆引四野他引努誐引五蘖車特梵二合六沒馱尾灑鹽七布曩囉誐摩曩野覩八唵鉢娜麼二合薩怛嚩二合穆九如前三密護懺悔隨喜等思惟菩提心而住薩埵身聖力所加持行願相應故持明傳本教無越三昧耶順行於學處悉地當現前我依大日教開示瑜祇行修證殊勝福普利諸有情大毗盧遮那成就儀軌二卷法全阿闍梨住玄法寺而所撰集故呼曰玄法寺儀軌此慈覺大師之請來也舊本五言偈頌一行四句是古來調經本之通法也然今所梓行則一行三句是由間有腳注其句難分而已又其所讐正皆以冠注之庶乎後賢為再正之時正德元年龍集辛卯仲秋念有三日靈雲道場沙門慧光欽識
